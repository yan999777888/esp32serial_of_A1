[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino  ; 

; 串口监控保持不变
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

; ###########################
; ESP32-S3-N16R8 核心配置 (Arduino 迁移版)
; ###########################

; 1. 指定 Arduino 内存类型组合：QIO 闪存 + OPI (Octal) PSRAM (N16R8 核心设置)
board_build.arduino.memory_type = qio_opi

; 2. 闪存配置
board_build.flash_mode = qio
board_upload.flash_size = 16MB

; 3. 指定分区表 (非常重要！否则 Arduino 默认只给你用 4MB)
; 可选：default_16MB.csv (默认) 或 large_app_8MB.csv (如果你的代码特别大)
board_build.partitions = default_16MB.csv 

; 4. 开启 PSRAM 的 Arduino 专属宏
build_flags =
    -DBOARD_HAS_PSRAM
    ; 如果需要开启最大日志输出，可以取消下一行的注释
    ; -DCORE_DEBUG_LEVEL=5